name: app-ci-cd

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  security-events: write

concurrency:
  group: golden-path-app-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: us-central1
  REPOSITORY: golden-path
  IMAGE_NAME: golden-path-microservice
  DEPLOY_REPO: ashequrrasul/gcp-golden-path-deploy
  DEPLOY_VALUES_FILE: helm/microservice/values.yaml

jobs:
  test-build-scan-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: PYTHONPATH=app pytest app/tests

      - name: Authenticate to Google Cloud
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: github.ref == 'refs/heads/main'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: github.ref == 'refs/heads/main'
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build image
        run: |
          IMAGE_TAG=${GITHUB_SHA::12}
          IMAGE_URI=$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          docker build -t "$IMAGE_URI" .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_URI }}
          format: table
          severity: CRITICAL,HIGH
          scanners: vuln
          ignore-unfixed: true
          exit-code: "0"

      - name: Generate Trivy SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_URI }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          scanners: vuln
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: docker push "$IMAGE_URI"

      - name: Checkout deployment repo
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEPLOY_REPO }}
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: deploy

      - name: Update deployment image tag
        if: github.ref == 'refs/heads/main'
        uses: mikefarah/yq@v4.44.6
        with:
          cmd: yq -i '.image.tag = strenv(IMAGE_TAG)' 'deploy/${{ env.DEPLOY_VALUES_FILE }}'

      - name: Commit deployment repo change
        if: github.ref == 'refs/heads/main'
        working-directory: deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${DEPLOY_VALUES_FILE}"
          git commit -m "chore: deploy app image ${IMAGE_TAG}" || exit 0
          git push
